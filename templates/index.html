<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UPI Dispute Resolution - Auth</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="auth-body">

    <div class="auth-container">
        <!-- LOG IN FORM -->
        <div class="auth-card login-card glassmorphism">
            <h2>Welcome Back</h2>
            <p>Sign in to manage your UPI disputes</p>
            <form id="loginForm">
                <div class="input-group">
                    <label>Phone Number</label>
                    <input type="text" id="loginPhone" placeholder="Enter phone" required>
                </div>
                <div class="input-group">
                    <label>MPIN</label>
                    <input type="password" id="loginMpin" placeholder="••••" required>
                </div>
                <button type="submit" class="btn primary-btn">Login</button>
            </form>
            <div id="loginMsg" class="msg"></div>
        </div>

        <!-- REGISTRATION FORM -->
        <div class="auth-card register-card glassmorphism">
            <h2>Create an Account</h2>
            <p>Join to automate your transaction resolutions</p>
            <form id="registerForm">
                <div class="input-group">
                    <label>Full Name</label>
                    <input type="text" id="regName" placeholder="Enter full name" required>
                </div>
                <div class="input-group">
                    <label>Email Address</label>
                    <input type="email" id="regEmail" placeholder="Enter email" required>
                </div>
                <div class="input-group">
                    <label>Phone Number</label>
                    <input type="text" id="regPhone" placeholder="Enter phone" required>
                </div>
                <div class="input-group">
                    <label>MPIN</label>
                    <input type="password" id="regMpin" placeholder="Choose a 4-digit MPIN" required maxlength="4">
                </div>
                <button type="submit" class="btn secondary-btn">Register</button>
            </form>
            <div id="registerMsg" class="msg"></div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
